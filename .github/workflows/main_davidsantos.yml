# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions
# Angular SPA Frontend - Deploy only static files to Azure App Service

name: Build and deploy Angular SPA to Azure Web App - davidsantos

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install dependencies
        working-directory: PortFolio
        run: npm install

      - name: Build Angular SPA (Production)
        working-directory: PortFolio
        run: npm run build

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: angular-dist
          path: PortFolio/dist/portifolio/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: angular-dist

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_D0EE3BFCF32C420181EFCEC730622E99 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_36A969733A4D4AB5813EBE8BEDF08EE5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C7A23EF0F682464F996BC49BCB222FE6 }}

      - name: Configure Azure App Service for SPA
        run: |
          az webapp config set \
            --resource-group DSDev \
            --name davidsantos \
            --startup-file "pm2 serve /home/site/wwwroot --no-daemon --spa"

      - name: Deploy Angular SPA to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'davidsantos'
          slot-name: 'Production'
          package: .
